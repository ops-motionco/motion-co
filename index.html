<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Motion × Ternium</title>
  <style>
    html,body{height:100%;margin:0;background:#071018;color:#fff;font-family:Arial,sans-serif}
    body{display:grid;place-items:center}
    .status{opacity:.82;text-align:center;padding:2rem}
  </style>
</head>
<body>
  <div class="status" id="status">Cargando propuesta…</div>
  <script>
  (async () => {
    const response = await fetch('./_assets/site.html.gz');
    if (!response.ok) throw new Error(`No se pudo cargar ${response.url}`);
    if (!('DecompressionStream' in window)) throw new Error('Navegador no compatible');
    const stream = response.body.pipeThrough(new DecompressionStream('gzip'));
    const html = await new Response(stream).text();
    document.open();
    document.write(html);
    document.close();
  })().catch((error) => {
    console.error(error);
    document.getElementById('status').textContent = 'No fue posible cargar la propuesta. Probá con una versión actualizada del navegador.';
  });
  </script>
</body>
</html>
